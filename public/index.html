          <div className="revisit-info">
            <div className="revisit-name">Remaining unique problems</div>
            <div className="revisit-meta">{tracker.remaining} left · next checkpoint {tracker.nextCheckpoint || 0}{tracker.remainingToCheckpoint ? ` in ${tracker.remainingToCheckpoint}` : ' reached'}</div>
          </div>
        </div>
        <div className="revisit-row">
          <div className="revisit-info">
            <div className="revisit-name">Current pace</div>
            <div className="revisit-meta">{tracker.solvedToday} solved today · {tracker.solvedLast7} solved in 7d · {tracker.attemptsLast7} attempts in 7d</div>
          </div>
        </div>
        <div className="revisit-row">
          <div className="revisit-info">
            <div className="revisit-name">Consistency streak</div>
            <div className="revisit-meta">{tracker.currentStreak} day{tracker.currentStreak === 1 ? '' : 's'} with at least one solve · {tracker.dueNow} review item{tracker.dueNow === 1 ? '' : 's'} due</div>
          </div>
        </div>
      </div>
      <div className="phase-bars" style={{marginTop:'12px'}}>
        {tracker.difficulty.map(level => (
          <div className="pb-row" key={level.label}>
            <div className="pname">{level.label}</div>
            <div className="pb-track"><div className="pb-fill" style={{width: level.pct + '%'}}></div></div>
            <div className="pcount">{level.solved}/{level.total}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function StudyInsights({tracker}){
  const latestSnapshot = tracker.latestMilestone ? new Date(tracker.latestMilestone.at).toLocaleDateString() : 'none yet';
  return (
    <div>
      <div className="ring-label" style={{marginBottom:'12px'}}>Study Signals <span style={{color:'var(--text-faint)', textTransform:'none', fontWeight:400}}>— adaptive</span></div>
      <div className="revisit-list">
        <div className="revisit-row">
          <div className="revisit-info">
            <div className="revisit-name">Primary pressure</div>
            <div className="revisit-meta">{tracker.weakestPattern ? `${tracker.weakestPattern.pattern} · ${Math.round(tracker.weakestPattern.solvedRate * 100)}% solved · ${tracker.weakestPattern.revisit} revisit signals` : 'No weak pattern signal yet.'}</div>
          </div>
        </div>
        <div className="revisit-row">
          <div className="revisit-info">
            <div className="revisit-name">Strongest pattern</div>
            <div className="revisit-meta">{tracker.strongestPattern ? `${tracker.strongestPattern.pattern} · ${Math.round(tracker.strongestPattern.solvedRate * 100)}% solved · unaided ${Math.round(tracker.strongestPattern.unaidedRate * 100)}%` : 'Not enough solved data yet.'}</div>
          </div>
        </div>
        <div className="revisit-row">
          <div className="revisit-info">
            <div className="revisit-name">Latest checkpoint</div>
            <div className="revisit-meta">{latestSnapshot} · next milestone target {tracker.nextCheckpoint || 0} unique solved</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const initialPrefs = readUiPrefs();
  const initialTimerPreset = TIMER_PRESET_MINUTES.includes(Number(initialPrefs.timerPresetMin))
    ? Number(initialPrefs.timerPresetMin)
    : 30;
  const initialTimerRemaining = Number.isFinite(initialPrefs.timerRemainingSec) && initialPrefs.timerRemainingSec > 0
    ? Math.floor(initialPrefs.timerRemainingSec)
    : initialTimerPreset * 60;
  const [appData, setAppData] = useState(null);
  const [sectionTab, setSectionTab] = useState(['overview','analysis','problems'].includes(initialPrefs.sectionTab) ? initialPrefs.sectionTab : 'problems');
  const [sessionMode, setSessionMode] = useState(Object.prototype.hasOwnProperty.call(SESSION_PRESETS, initialPrefs.sessionMode) ? initialPrefs.sessionMode : '30');
  const [importNotice, setImportNotice] = useState('');
  const [viewMode, setViewMode] = useState(initialPrefs.viewMode === 'pattern' ? 'pattern' : 'topic');
  const [filter, setFilter] = useState(['all','not-started','attempted','solved','revisit'].includes(initialPrefs.filter) ? initialPrefs.filter : 'all');
  const [searchQuery, setSearchQuery] = useState(typeof initialPrefs.searchQuery === 'string' ? initialPrefs.searchQuery : '');
  const [saveState, setSaveState] = useState('idle'); // idle | saving | saved
  const [compactMode, setCompactMode] = useState(!!initialPrefs.compactMode);
  const [focusMode, setFocusMode] = useState(!!initialPrefs.focusMode);
  const [groupOpen, setGroupOpen] = useState(() => {
    const topic = initialPrefs.groupOpen && initialPrefs.groupOpen.topic && typeof initialPrefs.groupOpen.topic === 'object'
      ? initialPrefs.groupOpen.topic
      : {};
    const pattern = initialPrefs.groupOpen && initialPrefs.groupOpen.pattern && typeof initialPrefs.groupOpen.pattern === 'object'
      ? initialPrefs.groupOpen.pattern
      : {};
    return { topic, pattern };
  });
  const [showTips, setShowTips] = useState(!readTipsDismissed());
  const [showShortcutModal, setShowShortcutModal] = useState(false);
  const [timerPresetMin, setTimerPresetMin] = useState(initialTimerPreset);
  const [timerRemainingSec, setTimerRemainingSec] = useState(initialTimerRemaining);
  const [timerRunning, setTimerRunning] = useState(false);
  const [toast, setToast] = useState(null);
  const saveTimer = useRef(null);
  const searchInputRef = useRef(null);

  useEffect(() => {
    fetch('/api/data').then(r => r.json()).then(d => {
      const normalized = normalizeAppData(d);
      setAppData(normalized);
      if(hasImportRepairs(normalized.report)){
        setImportNotice(`Startup normalization applied: ${summarizeImportReport(normalized.report)}`);
        persist(normalized);
      }
    }).catch(() => setAppData(normalizeAppData({ phases: emptyPhases() })));
  }, []);

  useEffect(() => {
    const isTypingTarget = (el) => {
      if(!el || !(el instanceof HTMLElement)) return false;
      const tag = el.tagName;
      return el.isContentEditable || tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
    };

    const onKeyDown = (event) => {
      if(event.key === '/' && !event.ctrlKey && !event.metaKey && !event.altKey){
        if(isTypingTarget(event.target)) return;
        event.preventDefault();
        if(searchInputRef.current){
          searchInputRef.current.focus();
          searchInputRef.current.select();
        }
        return;
      }
      if(event.key === 'Escape' && searchQuery){
        setSearchQuery('');
        return;
      }
      if(event.key === 'Escape' && showShortcutModal){
        setShowShortcutModal(false);
        return;
      }
      if(event.key === '?' && !event.ctrlKey && !event.metaKey && !event.altKey){
        if(isTypingTarget(event.target)) return;
        event.preventDefault();
        setShowShortcutModal(v => !v);
      }
    };

    window.addEventListener('keydown', onKeyDown);
    return () => window.removeEventListener('keydown', onKeyDown);
  }, [searchQuery, showShortcutModal]);

  useEffect(() => {
    writeUiPrefs({
      sectionTab,
      sessionMode,
      viewMode,
      filter,
      searchQuery,
      compactMode,
      focusMode,
      groupOpen,
      timerPresetMin,
      timerRemainingSec
    });
  }, [sectionTab, sessionMode, viewMode, filter, searchQuery, compactMode, focusMode, groupOpen, timerPresetMin, timerRemainingSec]);

  useEffect(() => {
    if(!toast) return;
    const timer = setTimeout(() => setToast(null), toast.duration || 2200);
    return () => clearTimeout(timer);
  }, [toast]);

  const pushToast = useCallback((type, message, options = {}) => {
    setToast({ id: Date.now(), type, message, ...options });
  }, []);

  useEffect(() => {
    if(!timerRunning) return;
    const intervalId = window.setInterval(() => {
      setTimerRemainingSec(prev => {
        if(prev <= 1){
          setTimerRunning(false);
          pushToast('success', 'Study timer complete.', {
            detail: 'Session finished. Log your key takeaway before starting the next block.',
            duration: 4800,
            icon: 'check'
          });
          return timerPresetMin * 60;
        }
        return prev - 1;
      });
    }, 1000);
    return () => window.clearInterval(intervalId);
  }, [timerRunning, timerPresetMin, pushToast]);

  const isTopicGroupOpen = useCallback((phaseId, idx) => {
    if(Object.prototype.hasOwnProperty.call(groupOpen.topic, phaseId)) return !!groupOpen.topic[phaseId];
    return idx === 0;
  }, [groupOpen]);

  const isPatternGroupOpen = useCallback((patternName, idx) => {
    if(Object.prototype.hasOwnProperty.call(groupOpen.pattern, patternName)) return !!groupOpen.pattern[patternName];
    return idx === 0;
  }, [groupOpen]);

  const toggleTopicGroup = useCallback((phaseId, idx) => {
    setGroupOpen(prev => {
      const current = Object.prototype.hasOwnProperty.call(prev.topic, phaseId) ? !!prev.topic[phaseId] : idx === 0;
      return {
        ...prev,
        topic: {
          ...prev.topic,
          [phaseId]: !current
        }
      };
    });
  }, []);

  const togglePatternGroup = useCallback((patternName, idx) => {
    setGroupOpen(prev => {
      const current = Object.prototype.hasOwnProperty.call(prev.pattern, patternName) ? !!prev.pattern[patternName] : idx === 0;
      return {
        ...prev,
        pattern: {
          ...prev.pattern,
          [patternName]: !current
        }
      };
    });
  }, []);

  const persist = useCallback((nextData) => {
    setSaveState('saving');
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      fetch('/api/data', {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ phases: nextData.phases, meta: nextData.meta })
      }).then(() => { setSaveState('saved'); setTimeout(() => setSaveState('idle'), 1500); })
        .catch(() => setSaveState('idle'));
    }, 250);
  }, []);

  const phases = appData ? appData.phases : null;
  const meta = appData ? appData.meta : { milestones: [], activityLog: [], problemIntentRules: [] };

  const runRepairPass = useCallback(() => {
    if(!appData) return;
    const normalized = normalizeAppData({ phases: appData.phases, meta: appData.meta });
    const summary = summarizeImportReport(normalized.report);
    setAppData(normalized);
    setImportNotice(`Manual repair pass: ${summary}`);
    persist(normalized);
    pushToast('success', 'Repair pass completed.');
  }, [appData, persist, pushToast]);

  const updateItem = (phaseId, itemId, patch) => {
    setAppData(prev => {
      const nowTs = Date.now();
      let changedItem = null;
      const nextPhases = {
        ...prev.phases,
        [phaseId]: prev.phases[phaseId].map(i => {
          if(i.id !== itemId) return i;
          let updated = normalizeItem({ ...i, ...patch });
          updated.lastAttemptAt = nowTs;
          if(patch.solutionType === 'unaided') updated.unaided = true;
          if(typeof patch.unaided === 'boolean') updated.solutionType = patch.unaided ? 'unaided' : (updated.solutionType === 'unaided' ? 'hint-used' : updated.solutionType);
          if(patch.status && patch.status !== i.status && (patch.status === 'attempted' || patch.status === 'solved')) {
            updated.attemptsCount = (i.attemptsCount || 0) + 1;
          }
          if(patch.status === 'solved' && i.status !== 'solved') {
            updated.solvedAt = nowTs;
            updated.firstAcceptedAt = i.firstAcceptedAt || nowTs;
          }
          if(patch.status === 'revisit' && i.status !== 'revisit') updated.revisitAt = nowTs;
          updated = applyReviewSchedule(updated, i, nowTs);
          if(patch.status && patch.status !== i.status) updated = appendHistoryEntry(updated, 'status', `${statusLabel(i.status)} -> ${statusLabel(patch.status)}`, nowTs);
          if(typeof patch.unaided === 'boolean' && patch.unaided !== !!i.unaided) updated = appendHistoryEntry(updated, 'unaided', patch.unaided ? 'marked unaided' : 'removed unaided flag', nowTs);
          if(patch.solutionType && patch.solutionType !== (i.solutionType || 'unknown')) updated = appendHistoryEntry(updated, 'solve-type', `set to ${patch.solutionType}`, nowTs);
          if(patch.pattern !== undefined && patch.pattern !== (i.pattern || '')) updated = appendHistoryEntry(updated, 'pattern', `pattern -> ${patch.pattern || 'cleared'}`, nowTs);
          if(patch.company !== undefined && patch.company !== (i.company || '')) updated = appendHistoryEntry(updated, 'company', `company -> ${patch.company || 'cleared'}`, nowTs);
          if(patch.notes !== undefined && patch.notes !== (i.notes || '')) updated = appendHistoryEntry(updated, 'notes', 'notes updated', nowTs);
          changedItem = updated;
          return updated;
        })
      };

      const withRevision = changedItem ? queueRevisionCopy(nextPhases, phaseId, changedItem) : nextPhases;
      const flatNext = flattenPhases(withRevision);
      const nextMeta = changedItem && changedItem.status === 'solved'
        ? maybeAppendMilestone(prev.meta, flatNext, nowTs, false)
        : prev.meta;
      const nextData = { phases: withRevision, meta: nextMeta };
      persist(nextData);
      return nextData;
    });
  };

  const createSnapshotNow = useCallback(() => {
    setAppData(prev => {
      const nowTs = Date.now();
      const flatNow = flattenPhases(prev.phases);
      let nextMeta = maybeAppendMilestone(prev.meta, flatNow, nowTs, true);
      nextMeta = appendGlobalActivity(nextMeta, 'snapshot', 'manual snapshot created', nowTs);
      const nextData = { phases: prev.phases, meta: nextMeta };
      setImportNotice('Manual snapshot created.');
      persist(nextData);
      pushToast('success', 'Snapshot saved.');
      return nextData;
    });
  }, [persist, pushToast]);

  const deleteItem = (phaseId, itemId) => {
    setAppData(prev => {
      const prevSnapshot = cloneTrackerData(prev);
      const removed = (prev.phases[phaseId] || []).find(i => i.id === itemId);
      const nextData = {
        ...prev,
        phases: { ...prev.phases, [phaseId]: prev.phases[phaseId].filter(i => i.id !== itemId) },
        meta: appendGlobalActivity(prev.meta, 'delete', removed ? `removed ${removed.name}` : 'removed problem', Date.now(), removed ? { itemName: removed.name, phaseId } : { phaseId })
      };
      persist(nextData);
      pushToast('success', 'Problem removed.', {
        duration: 6000,
        actionLabel: 'Undo',
        onAction: () => {
          setAppData(prevSnapshot);
          persist(prevSnapshot);
          pushToast('success', 'Removal undone.');
        }
      });
      return nextData;
    });
  };

  const addItem = (phaseId, fields) => {
    setAppData(prev => {
      const nowTs = Date.now();
      let item = normalizeItem({
        id: uid(), name: fields.name, link: fields.link || '', pattern: fields.pattern || '',
        company: fields.company || '', difficulty: fields.difficulty || 'Medium',
        status: 'not-started', unaided: false, notes: '', hints: [],
        createdAt: nowTs, solvedAt: null, revisitAt: null
      });
      item = appendHistoryEntry(item, 'created', 'problem added to tracker', nowTs);
      const nextData = {
        ...prev,
        phases: { ...prev.phases, [phaseId]: [...prev.phases[phaseId], item] },
        meta: appendGlobalActivity(prev.meta, 'create', `added ${item.name}`, nowTs, { itemName: item.name, phaseId, canonicalProblemId: item.canonicalProblemId })
      };
      persist(nextData);
      pushToast('success', 'Problem added.');
      return nextData;
    });
  };

  const exportBackup = () => {
    const blob = new Blob([JSON.stringify({ phases: appData.phases, meta: appData.meta }, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `dsa-tracker-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setAppData(prev => {
      const nextData = { ...prev, meta: appendGlobalActivity(prev.meta, 'export', 'backup exported', Date.now()) };
      persist(nextData);
      return nextData;
    });
    pushToast('success', 'Backup exported.');
  };

  const importFileRef = useRef(null);
  const importBackup = (file) => {
    const reader = new FileReader();
    reader.onload = e => {
      try{
        const previous = appData ? cloneTrackerData(appData) : null;
        const parsed = JSON.parse(e.target.result);
        const nextData = normalizeAppData(parsed.phases ? parsed : { phases: parsed });
        const incomingFlat = flattenPhases(nextData.phases);
        const incomingUnique = uniqueProgress(incomingFlat);
        const preview = summarizeImportReport(nextData.report);
        const msg = [
          'Import preview:',
          `- ${incomingFlat.length} total entries`,
          `- ${incomingUnique.total} unique problems`,
          `- ${incomingUnique.solved} unique solved`,
          `- Repairs: ${preview}`,
          '',
          'This will replace your current tracker data. Continue?'
        ].join('\n');
        if(!window.confirm(msg)) return;
        const nowTs = Date.now();
        nextData.meta = appendGlobalActivity(nextData.meta, 'import', 'backup imported', nowTs);
        setAppData(nextData);
        setImportNotice(`Import complete: ${summarizeImportReport(nextData.report)}`);
        persist(nextData);
        pushToast('success', 'Backup imported.', previous ? {
          duration: 7000,
          actionLabel: 'Undo',
          onAction: () => {
            setAppData(previous);
            persist(previous);
            pushToast('success', 'Import undone.');
          }
        } : {});
      }catch(err){
        pushToast('error', 'Import failed.');
        alert('Could not import this file: ' + err.message);
      }
    };
    reader.readAsText(file);
  };

  const flat = useMemo(() => {
    if(!phases) return [];
    return flattenPhases(phases);
  }, [phases]);

  const byPattern = useMemo(() => {
    const map = {};
    flat.forEach(entry => {
      const key = (entry.item.pattern || '').trim() || 'Unsorted';
      if(!map[key]) map[key] = [];
      map[key].push(entry);
    });
    return Object.entries(map).sort((a,b) => b[1].length - a[1].length);
  }, [flat]);

  const dashboardData = useMemo(() => {
    const totals = uniqueProgress(flat);
    const weakPatterns = buildPatternInsights(flat);
    const dailyPlan = buildDailyPlan(flat, weakPatterns, sessionMode);
    const heatmapCells = buildHeatmap(flat, computeHeatmapWeeks(flat));
    const revisitQueue = buildRevisitQueue(flat, Math.min(8, Math.max(3, Math.ceil(flat.length / 10) || 3)));
    const integrity = buildIntegrityStats(flat);
    const phaseStats = {};
    if(phases){
      PHASE_DEFS.forEach(p => {
        const items = phases[p.id] || [];
        const solved = items.reduce((acc, i) => acc + (i.status === 'solved' ? 1 : 0), 0);
        const total = items.length;
        phaseStats[p.id] = { solved, total, pct: total ? Math.round((solved / total) * 100) : 0 };
      });
    }
    const tracker = buildProgressTracker(flat, weakPatterns, revisitQueue, meta.milestones || []);
    const trends = buildWeeklyTrends(flat);
    const readiness = buildPhaseReadiness(phases || emptyPhases());
    const revisionInsights = buildRevisionInsights(flat, revisitQueue);
    const recentActivity = buildRecentActivity(flat, meta.activityLog || [], Math.min(10, Math.max(4, Math.ceil(flat.length / 8) || 4)));
    const nextAction = buildNextBestAction(dailyPlan, revisitQueue, weakPatterns, tracker);
    return { totals, weakPatterns, dailyPlan, heatmapCells, revisitQueue, phaseStats, integrity, tracker, trends, readiness, revisionInsights, recentActivity, nextAction };
  }, [flat, phases, meta.milestones, meta.activityLog, sessionMode]);

  const { totals, weakPatterns, dailyPlan, heatmapCells, revisitQueue, phaseStats, integrity, tracker, trends, readiness, revisionInsights, recentActivity, nextAction } = dashboardData;
  const timerTotalSec = Math.max(1, timerPresetMin * 60);
  const timerRemainingPct = Math.max(0, Math.min(100, Math.round((timerRemainingSec / timerTotalSec) * 100)));
  const visibleCount = useMemo(() => {
    return flat.reduce((acc, entry) => {
      const statusOk = filter === 'all' || entry.item.status === filter;
      const searchOk = matchesSearch(entry.item, searchQuery);
      return acc + (statusOk && searchOk ? 1 : 0);
    }, 0);
  }, [flat, filter, searchQuery]);

  const onboardingHint = useMemo(() => {
    if(totals.solved > 10) return '';
    if((phaseStats.setup && phaseStats.setup.solved < 2) || (phaseStats.arrays && phaseStats.arrays.solved < 3)){
      return 'First week focus: finish Setup refresh, then solve 3 Easy in Arrays & Hashing.';
    }
    return 'Start with Easy problems in your current open topic before moving to Medium.';
  }, [totals.solved, phaseStats]);

  const jumpToRevision = useCallback(() => {
    setSectionTab('problems');
    setViewMode('topic');
    setFilter('all');
    setSearchQuery('');
    setGroupOpen(prev => ({ ...prev, topic: { ...prev.topic, revision: true } }));
    pushToast('success', 'Opened revision track.');
  }, [pushToast]);

  const solveFirstDue = useCallback(() => {
    if(revisitQueue.length === 0){
      pushToast('error', 'No due review items right now.');
      return;
    }
    const first = revisitQueue[0];
    updateItem(first.phaseId, first.item.id, { status: 'solved' });
    pushToast('success', 'Marked one due item as solved.');
  }, [revisitQueue, updateItem, pushToast]);

  const quickAddToArrays = useCallback(() => {
    setSectionTab('problems');
    setViewMode('topic');
    setGroupOpen(prev => ({ ...prev, topic: { ...prev.topic, arrays: true } }));
    pushToast('success', 'Arrays section opened.');
  }, [pushToast]);

  const setTimerPreset = useCallback((minutes) => {
    if(!TIMER_PRESET_MINUTES.includes(minutes)) return;
    setTimerPresetMin(minutes);
    if(!timerRunning) setTimerRemainingSec(minutes * 60);
  }, [timerRunning]);

  const toggleTimer = useCallback(() => {
    setTimerRunning(prev => {
      const next = !prev;
      if(next && timerRemainingSec <= 0){
        setTimerRemainingSec(timerPresetMin * 60);
      }
      return next;
    });
  }, [timerRemainingSec, timerPresetMin]);

  const resetTimer = useCallback(() => {
    setTimerRunning(false);
    setTimerRemainingSec(timerPresetMin * 60);
  }, [timerPresetMin]);

  const openProblemsHub = useCallback(() => {
    setSectionTab('problems');
    setViewMode('topic');
    pushToast('success', 'Opened problems workspace.');
  }, [pushToast]);

  const focusProblem = useCallback((target) => {
    if(!target || !target.itemId) return;
    setSectionTab('problems');
    setViewMode('topic');
    setGroupOpen(prev => ({
      ...prev,
      topic: {
        ...prev.topic,
        [target.phaseId]: true
      }
    }));
    window.setTimeout(() => {
      const element = document.getElementById(`problem-${target.itemId}`);
      if(element){
        element.scrollIntoView({ behavior: 'smooth', block: 'center' });
        if(typeof element.focus === 'function') element.focus({ preventScroll: true });
      }
    }, 80);
    pushToast('success', 'Opened recommended problem.');
  }, [pushToast]);

  const runNextBestAction = useCallback(() => {
    if(!nextAction) return;
    if(nextAction.actionKey === 'focus_problem'){
      focusProblem(nextAction.target);
      return;
    }
    if(nextAction.actionKey === 'open_revision'){
      jumpToRevision();
      return;
    }
    openProblemsHub();
  }, [nextAction, focusProblem, jumpToRevision, openProblemsHub]);

  if(!phases) return <div style={{padding:'60px', fontFamily:'var(--font-mono)', color:'#8b5cf6'}}>Loading…</div>;

  return (
    <React.Fragment>
      <datalist id="patternSuggestions">
        {PATTERN_SUGGESTIONS.map(p => <option key={p} value={p} />)}
      </datalist>
      <datalist id="companySuggestions">
        {COMPANY_SUGGESTIONS.map(c => <option key={c} value={c} />)}
      </datalist>

      <div className={`page-shell ${compactMode ? 'compact-mode' : ''} ${focusMode ? 'focus-mode' : ''}`}>
      <header>
        <div className="header-top">
          <div>
            <div className="eyebrow">Local-first DSA studio</div>
            <h1>Study DSA with a Clear, Punchy Workspace</h1>
            <p className="sub">A cleaner, high-contrast dashboard for topic tracking, pattern practice, and quick revision. Data lives in <code className="inline">data/data.json</code> next to this server.</p>
          </div>
          <div className={`save-indicator ${saveState}`}>
            {saveState === 'saving' ? '● saving…' : saveState === 'saved' ? '✓ saved to data.json' : '\u00A0'}
          </div>
        </div>
        <div className="header-meta">
          <span className="meta-pill"><strong>Local first</strong> no cloud sync</span>
          <span className="meta-pill"><strong>JSON backed</strong> edits persist instantly</span>
          <span className="meta-pill"><strong>No build</strong> runs from a single HTML file</span>
        </div>
        <div className="quick-actions">
          <span className="quick-title">Quick actions</span>
          <button className="quick-btn" onClick={solveFirstDue}>{Icon({ name: 'zap', size: 12 })}Solve 1 due</button>
          <button className="quick-btn" onClick={jumpToRevision}>{Icon({ name: 'target', size: 12 })}Open revision</button>
          <button className="quick-btn" onClick={quickAddToArrays}>{Icon({ name: 'plus', size: 12 })}Add in arrays</button>
          <button className="quick-btn" onClick={() => setShowShortcutModal(true)}>{Icon({ name: 'keyboard', size: 12 })}Shortcuts</button>
        </div>
        <div className="study-timer">
          <span className="quick-title">Study timer</span>
          <div className="timer-presets">
            {TIMER_PRESET_MINUTES.map(minutes => (
              <button
                key={minutes}
                className={`timer-preset-btn ${timerPresetMin === minutes ? 'active' : ''}`}
                onClick={() => setTimerPreset(minutes)}
              >
                {minutes}m
              </button>
            ))}
          </div>
          <div className={`timer-circle ${timerRunning ? 'running' : ''}`} style={{'--timer-pct': timerRemainingPct}}>
            <div className="timer-circle-inner">
              <div className="timer-clock">{formatTimerClock(timerRemainingSec)}</div>
              <div className="timer-left">{timerRemainingPct}% left</div>
            </div>
          </div>
          <div className="timer-controls">
            <button className="timer-control-btn primary" onClick={toggleTimer}>
              {Icon({ name: timerRunning ? 'half' : 'zap', size: 12 })} {timerRunning ? 'Pause' : 'Start'}
            </button>
            <button className="timer-control-btn" onClick={resetTimer}>
              {Icon({ name: 'refresh', size: 12 })} Reset
            </button>
          </div>
        </div>
        {onboardingHint && <div className="guide-bar"><strong>Guide:</strong> {onboardingHint}</div>}
      </header>

      <div className="section-switcher">
        <div className="section-switcher-label">Page sections</div>
        <div className="section-tabs">
          {['overview','analysis','problems'].map(tab => (
            <button
              key={tab}
              className={`section-tab-btn ${sectionTab === tab ? 'active' : ''}`}
              onClick={() => setSectionTab(tab)}
            >
              {tab.charAt(0).toUpperCase() + tab.slice(1)}
            </button>
          ))}
        </div>
      </div>

      {sectionTab === 'overview' && <div className="dashboard">
        <div className="dash-grid overview-hero-grid">
          <div className="overview-side-stack">
            <div className="card progress-card">
              <div className="ring-label">Overall Progress</div>
              <div className="ring-wrap">
                <div className="ring-num">{totals.pct}%</div>
                <div style={{fontSize:'12.5px', color:'var(--text-dim)', fontFamily:'var(--font-mono)'}}>
                  <div>{totals.solved} unique solved</div>
                  <div style={{color:'var(--text-faint)', marginTop:'2px'}}>{totals.total} unique problems</div>
                </div>
              </div>
              <div className="legend">
                <span><span className="dot" style={{background:'#c4b5fd'}}></span>not started</span>
                <span><span className="dot" style={{background:'var(--gold)'}}></span>attempted</span>
                <span><span className="dot" style={{background:'var(--teal)'}}></span>solved</span>
                <span><span className="dot" style={{background:'var(--coral)'}}></span>revisit</span>
              </div>
            </div>
            <div className="overview-mini-grid">
              <div className="card overview-stat-card stat-solved">
                <div className="overview-stat-label">Solved Today</div>
                <div className="overview-stat-value">{tracker.solvedToday}</div>
                <div className="overview-stat-note">{tracker.solvedLast7} solved in 7d</div>
              </div>
              <div className="card overview-stat-card stat-due">
                <div className="overview-stat-label">Due Reviews</div>
                <div className="overview-stat-value">{tracker.dueNow}</div>
                <div className="overview-stat-note">ready for revisit now</div>
              </div>
              <div className="card overview-stat-card stat-streak">
                <div className="overview-stat-label">Current Streak</div>
                <div className="overview-stat-value">{tracker.currentStreak}d</div>
                <div className="overview-stat-note">days with at least one solve</div>
              </div>
              <div className="card overview-stat-card stat-checkpoint">
                <div className="overview-stat-label">Next Checkpoint</div>
                <div className="overview-stat-value">{tracker.nextCheckpoint || 0}</div>
                <div className="overview-stat-note">{tracker.remainingToCheckpoint ? `${tracker.remainingToCheckpoint} more solves` : 'checkpoint reached'}</div>
              </div>
              <div className="card overview-stat-card stat-attempts">
                <div className="overview-stat-label">Attempts 7d</div>
                <div className="overview-stat-value">{tracker.attemptsLast7}</div>
                <div className="overview-stat-note">recent tries across the roadmap</div>
              </div>
              <div className="card overview-stat-card stat-remaining">
                <div className="overview-stat-label">Remaining</div>
                <div className="overview-stat-value">{tracker.remaining}</div>
                <div className="overview-stat-note">unique problems still unsolved</div>
              </div>
            </div>
          </div>
          <div className="card">
            <div className="ring-label" style={{marginBottom:'12px'}}>By Topic</div>
            <div className="phase-bars">
              {PHASE_DEFS.map(p => {
                const stats = phaseStats[p.id] || { solved: 0, total: 0, pct: 0 };
                return (
                  <div className="pb-row" key={p.id}>
                    <div className="pname">{p.title}</div>
                    <div className="pb-track"><div className="pb-fill" style={{width: stats.pct+'%'}}></div></div>
                    <div className="pcount">{stats.solved}/{stats.total}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
        <div className="dash-grid">
          <div className="card card-compact">
            <Heatmap cells={heatmapCells} />
          </div>
          <div className="card card-compact">
            <RevisitQueue queue={revisitQueue} onUpdate={updateItem} />
          </div>
        </div>
        <div className="dash-grid">
          <div className="card card-compact">
            <NextBestAction action={nextAction} onRun={runNextBestAction} />
          </div>
          <div className="card card-compact">
            <WeeklyTrends trends={trends} />
          </div>
        </div>
        <div className="dash-grid">
          <div className="card card-compact">
            <DailyPlan items={dailyPlan} />
          </div>
          <div className="card card-compact">
            <WeakPatterns insights={weakPatterns} />
          </div>
        </div>
        <div className="dash-grid">
          <div className="card card-compact">
            <Milestones milestones={meta.milestones || []} onCreate={createSnapshotNow} />
          </div>
          <div className="card card-compact">
            <div className="ring-label" style={{marginBottom:'12px'}}>System Checks <span style={{color:'var(--text-faint)', textTransform:'none', fontWeight:400}}>— {integrity.duplicateEntries ? `${integrity.duplicateEntries} duplicate entr${integrity.duplicateEntries === 1 ? 'y' : 'ies'}` : 'clean'}</span></div>
            <div className="revisit-list">
              <div className="revisit-row">
                <div className="revisit-info">
                  <div className="revisit-name">Duplicate canonical links</div>
                  <div className="revisit-meta">{integrity.duplicateCanonicalKeys} canonical ids across {integrity.duplicateEntries} extra entries</div>
                </div>
              </div>
              <div className="revisit-row">
                <div className="revisit-info">
                  <div className="revisit-name">Due reviews</div>
                  <div className="revisit-meta">{integrity.dueReviews} problems currently due</div>
                </div>
              </div>
              <div className="revisit-row">
                <div className="revisit-info">
                  <div className="revisit-name">Revision queue size</div>
                  <div className="revisit-meta">{integrity.revisionCount} problems in revision phase</div>
                </div>
              </div>
            </div>
            <div style={{marginTop:'12px'}}>
              <button className="revisit-solve-btn" onClick={runRepairPass}>Run Repair Pass</button>
            </div>
          </div>
        </div>
        <div className="dash-grid">
          <div className="card card-compact">
            <ProgressTracker tracker={tracker} />
          </div>
          <div className="card card-compact">
            <StudyInsights tracker={tracker} />
          </div>
        </div>
        <div className="dash-grid">
          <div className="card card-compact">
            <PhaseReadiness phases={readiness} />
          </div>
          <div className="card card-compact">
            <RevisionIntelligence insights={revisionInsights} />
          </div>
        </div>
        <div className="dash-grid">
          <div className="card card-compact">
            <SessionPlanner sessionMode={sessionMode} onChange={setSessionMode} planCount={dailyPlan.length} />
          </div>
          <div className="card card-compact">
            <RecentActivity items={recentActivity} />
          </div>
        </div>
      </div>}

      {sectionTab === 'analysis' && <div className="dashboard">
        <div className="dash-grid">
          <div className="card card-compact">
            <Heatmap cells={heatmapCells} />
          </div>
          <div className="card card-compact">
            <WeakPatterns insights={weakPatterns} />
          </div>
        </div>
        <div className="dash-grid">
          <div className="card card-compact">
            <NextBestAction action={nextAction} onRun={runNextBestAction} />
          </div>
          <div className="card card-compact">
            <WeeklyTrends trends={trends} />
          </div>
        </div>
        <div className="dash-grid">
          <div className="card card-compact">
            <DailyPlan items={dailyPlan} />
          </div>
          <div className="card card-compact">
            <Milestones milestones={meta.milestones || []} onCreate={createSnapshotNow} />
          </div>
        </div>
        <div className="dash-grid">
          <div className="card card-compact">
            <ProgressTracker tracker={tracker} />
          </div>
          <div className="card card-compact">
            <StudyInsights tracker={tracker} />
          </div>
        </div>
        <div className="dash-grid">
          <div className="card card-compact">
            <PhaseReadiness phases={readiness} />
          </div>
          <div className="card card-compact">
            <RevisionIntelligence insights={revisionInsights} />
          </div>
        </div>
        <div className="dash-grid">
          <div className="card card-compact">
            <SessionPlanner sessionMode={sessionMode} onChange={setSessionMode} planCount={dailyPlan.length} />
          </div>
          <div className="card card-compact">
            <RecentActivity items={recentActivity} />
          </div>
        </div>
      </div>}

      {sectionTab === 'problems' && <div className="controls">
        <div className="control-block">
          <span className="control-label">View</span>
          <button className={`filter-btn ${viewMode==='topic'?'active':''}`} onClick={() => setViewMode('topic')}>By Topic</button>
          <button className={`filter-btn ${viewMode==='pattern'?'active':''}`} onClick={() => setViewMode('pattern')}>By Pattern</button>
          <button className={`filter-btn ${focusMode ? 'active' : ''}`} onClick={() => setFocusMode(v => !v)}>
            {focusMode ? 'Show Dashboard' : 'Focus Mode'}
          </button>
        </div>
        <div className="control-block">
          <span className="control-label">Status</span>
          {['all','not-started','attempted','solved','revisit'].map(f => (
            <button key={f} className={`filter-btn ${filter===f?'active':''}`} onClick={() => setFilter(f)}>
              {f === 'all' ? 'All' : statusLabel(f)}
            </button>
          ))}
        </div>
        <div className="control-block">
          <span className="control-label">Density</span>
          <button className={`filter-btn ${compactMode ? 'active' : ''}`} onClick={() => setCompactMode(v => !v)}>
            {compactMode ? 'Comfortable View' : 'Compact View'}
          </button>
          {!showTips && (
            <button className="tip-btn" onClick={() => { setShowTips(true); writeTipsDismissed(false); }}>Show tips</button>
          )}
          {(filter !== 'all' || searchQuery) && (
            <button className="reset-btn" onClick={() => { setFilter('all'); setSearchQuery(''); }}>Clear filters</button>
          )}
        </div>
        <div className="control-block">
          <span className="control-label">Data</span>
          <button className="reset-btn reset-neutral" onClick={exportBackup}>Export backup</button>
          <button className="reset-btn reset-neutral" onClick={() => importFileRef.current.click()}>Import backup</button>
        </div>
        <div className="control-block search-wrap">
          <span className="control-label">Search</span>
          {Icon({ name: 'search', size: 14 })}
          <input
            ref={searchInputRef}
            className="search-input"
            type="text"
            value={searchQuery}
            onChange={e => setSearchQuery(e.target.value)}
            placeholder="Search title / pattern / company"
            aria-label="Search problems"
          />
          {searchQuery && <button className="search-clear" onClick={() => setSearchQuery('')}>Clear</button>}
          <span className="search-count">{visibleCount} shown</span>
          <span className="search-hint">/ focus · Esc clear</span>
        </div>
        <input ref={importFileRef} type="file" accept="application/json" style={{display:'none'}}
          onChange={e => { if(e.target.files[0]) importBackup(e.target.files[0]); e.target.value = ''; }} />
      </div>}
      {showTips && (
        <div className="tips-bar">
          <div className="tips-title">Quick tips</div>
          <div className="tips-items">
            <span>/ focuses search</span>
            <span className="tips-sep">•</span>
            <span>Esc clears search</span>
            <span className="tips-sep">•</span>
            <span>Use Compact View for dense scanning</span>
            <span className="tips-sep">•</span>
            <span>Revisit queue surfaces due practice first</span>
          </div>
          <div className="tips-actions">
            <button className="tip-btn" onClick={() => { setShowTips(false); writeTipsDismissed(true); }}>Dismiss</button>
          </div>
        </div>
      )}
      {importNotice && (
        <div className="notice-bar"><strong>Import report:</strong> {importNotice}</div>
      )}

      {toast && (
        <div className="toast-wrap">
          <div className={`toast toast-${toast.type}`}>
            <div className="toast-main">
              <div className="toast-copy">
                <div className="toast-head">
                  {Icon({ name: toast.icon || (toast.type === 'error' ? 'refresh' : 'check'), size: 12 })}
                  <span className="toast-message">{toast.message}</span>
                </div>
                {toast.detail && <div className="toast-detail">{toast.detail}</div>}
              </div>
              {toast.actionLabel && typeof toast.onAction === 'function' && (
                <button
                  className="toast-action"
                  onClick={() => { toast.onAction(); setToast(null); }}
                >
                  {Icon({ name: 'undo', size: 11 })} {toast.actionLabel}
                </button>
              )}
            </div>
          </div>
        </div>
      )}

      {showShortcutModal && (
        <div className="shortcuts-overlay" onClick={() => setShowShortcutModal(false)}>
          <div className="shortcuts-card" onClick={e => e.stopPropagation()}>
            <div className="shortcuts-head">
              <div className="shortcuts-title">Keyboard shortcuts</div>
              <button className="tip-btn" onClick={() => setShowShortcutModal(false)}>Close</button>
            </div>
            <div className="shortcut-list">
              <div className="shortcut-row"><span className="shortcut-key">/</span><span className="shortcut-desc">Focus search</span></div>
              <div className="shortcut-row"><span className="shortcut-key">Esc</span><span className="shortcut-desc">Clear search or close modal</span></div>
              <div className="shortcut-row"><span className="shortcut-key">?</span><span className="shortcut-desc">Toggle shortcuts modal</span></div>
              <div className="shortcut-row"><span className="shortcut-key">Enter</span><span className="shortcut-desc">Submit add-problem row fields</span></div>
            </div>
          </div>
        </div>
      )}

      {sectionTab === 'problems' && <div className="list">
        {viewMode === 'topic'
          ? PHASE_DEFS.map((def, idx) => (
              <PhaseGroup key={def.id} def={def} idx={idx} items={phases[def.id] || []}
                filter={filter} searchQuery={searchQuery}
                isOpen={isTopicGroupOpen(def.id, idx)}
                onToggle={() => toggleTopicGroup(def.id, idx)}
                onUpdate={updateItem} onDelete={deleteItem} onAdd={addItem} onToast={pushToast} intentRules={meta.problemIntentRules || []} />
            ))
          : byPattern.map(([patternName, entries], idx) => (
              <PatternGroup key={patternName} patternName={patternName} idx={idx} entries={entries}
                filter={filter} searchQuery={searchQuery}
                isOpen={isPatternGroupOpen(patternName, idx)}
                onToggle={() => togglePatternGroup(patternName, idx)}
                onUpdate={updateItem} onDelete={deleteItem} onToast={pushToast} intentRules={meta.problemIntentRules || []} />
            ))
        }
          </div>}

      <footer>data stored in data/data.json on your machine · add problems from Striver's SDE Sheet, NeetCode 150, or LeetCode as you go</footer>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
